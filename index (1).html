<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APEX — Fitness & Health Centre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <!-- Calendly widget CSS -->
  <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --forest:  #0d3022; --forest2: #0a2419; --forest3: #164535;
      --mid:     #1e5c42; --sage:    #2d7a57;  --mint:    #4caf82;
      --gold:    #c9a84c; --gold2:   #e8c96a;
      --cream:   #f5f0e8; --cream2:  #faf7f2;
      --white:   #ffffff; --charcoal:#1a1a1a;  --muted:   #6b7b6e;
      --font-display:'Bebas Neue',sans-serif;
      --font-serif:'Cormorant Garamond',serif;
      --font-body:'Barlow',sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family:var(--font-body); background:var(--cream2); color:var(--charcoal); overflow-x:hidden; cursor:none; }

    /* PAGE SYSTEM */
    .page { display:none; }
    .page.active { display:block; }

    /* CURSOR */
    .cursor { position:fixed;top:0;left:0;width:12px;height:12px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%); }
    .cursor-ring { position:fixed;top:0;left:0;width:36px;height:36px;border:1.5px solid var(--gold);border-radius:50%;pointer-events:none;z-index:9998;transition:transform .35s ease,width .3s,height .3s,opacity .3s;transform:translate(-50%,-50%);opacity:.5; }
    .cursor-ring.hovered { width:56px;height:56px;opacity:1; }

    /* NAV */
    nav { position:fixed;top:0;left:0;right:0;z-index:1000;padding:0 5%;height:72px;display:flex;align-items:center;justify-content:space-between;transition:background .4s; }
    nav.scrolled { background:rgba(13,48,34,.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(201,168,76,.15); }
    nav.always-dark { background:rgba(13,48,34,.97);border-bottom:1px solid rgba(201,168,76,.15); }
    .nav-logo { font-family:var(--font-display);font-size:2rem;color:var(--white);letter-spacing:3px;text-decoration:none;cursor:pointer; }
    .nav-logo span { color:var(--gold); }
    .nav-links { display:flex;gap:2.5rem;list-style:none
